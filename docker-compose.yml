services:
  postgres:
    image: postgres:16-alpine
    container_name: customer-support-postgres
    environment:
      POSTGRES_DB: customer-support
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U customer-support" ]
      interval: 5s
      timeout: 5s
      retries: 5

  customer-support-api:
    build:
      context: .
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: customer-support-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/customer-support
      QUARKUS_DATASOURCE_USERNAME: ${DB_USER}
      QUARKUS_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SMALLRYE_JWT_SIGN_KEY_LOCATION: file:/deployments/keys/private.pem
      MP_JWT_VERIFY_PUBLIC_KEY_LOCATION: file:/deployments/keys/public.pem
      QUARKUS_FLYWAY_MIGRATE_AT_START: "true"
    volumes:
      - ./keys:/deployments/keys:ro
    ports:
      - "8080:8080"

volumes:
  postgres_data:
