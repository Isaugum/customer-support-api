# PostgreSQL is handled automatically by Quarkus Dev Services (requires Docker).
# No datasource URL needed here — Dev Services spins up a container for tests.

# Flyway runs migrations (V1 + V2 seed) automatically on the test DB.
# Seed data IDs (based on V2 insertion order):
#   ID 1 = Miha    (USER)   miha@example.com
#   ID 2 = Brina   (USER)   brina@example.com
#   ID 3 = Tone    (OPERATOR) tone@example.com
#   ID 4 = Peter   (OPERATOR) peter@example.com
#   All passwords: "password"
#   Room IDs: 1=Tehnika, 2=Storitve, 3=Pogovor

# JWT — reuse the dev keys; @TestSecurity bypasses verification entirely for IT tests.
mp.jwt.verify.publickey.location=keys/public.pem
smallrye.jwt.sign.key.location=keys/private.pem
mp.jwt.verify.issuer=customer-support-api
smallrye.jwt.sign.key-format=PKCS8
