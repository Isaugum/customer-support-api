# === Datasource ===
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:customer-support}
quarkus.datasource.password=${DB_PASSWORD:changeme}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/customer-support}
# === Hibernate ===
quarkus.hibernate-orm.database.generation=none
quarkus.flyway.migrate-at-start=true
# === JWT ===
mp.jwt.verify.publickey.location=keys/public.pem
smallrye.jwt.sign.key.location=keys/private.pem
mp.jwt.verify.issuer=customer-support-api
smallrye.jwt.sign.key-format=PKCS8
# === OpenAPI / Swagger ===
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui
quarkus.smallrye-openapi.path=/openapi
# === CORS (for browser operator client) ===
quarkus.http.cors.origins=http://localhost:3000
# === Logging ===
quarkus.log.level=INFO
quarkus.log.category."com.customersupport".level=DEBUG